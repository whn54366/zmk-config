# ===================== 主控核心配置 =====================
# 指定 NICE!nRF52840 主控（必须保留）
CONFIG_BOARD_NICE_NANO_V2=y

# ===================== 双模式开关（核心） =====================
CONFIG_ZMK_USB=y          # 开启 USB 有线模式（格斗键盘低延迟优先）
CONFIG_ZMK_BLE=y          # 开启 BLE 蓝牙无线模式（双模式关键）
CONFIG_ZMK_SPLIT=n        # 非分体键盘，关闭 split（必关）

# ===================== 蓝牙优化（无线模式） =====================
CONFIG_ZMK_BLE_ADVERTISING_INTERVAL=100  # 蓝牙广播间隔（越小越耗电，100ms 平衡）
CONFIG_ZMK_BLE_CONN_MAX_INTERVAL=30      # 蓝牙最大连接间隔（降低延迟）
CONFIG_ZMK_BLE_CONN_MIN_INTERVAL=20      # 蓝牙最小连接间隔
CONFIG_ZMK_BLE_POWER_CONTROL=y           # 蓝牙功率控制（提升无线距离）
CONFIG_ZMK_BLE_NAME="WHN_Fight_Keyboard" # 蓝牙设备名（自定义，纯英文）

# ===================== 有线模式优化 =====================
CONFIG_ZMK_USB_CONSUMER=y                # 开启 USB 消费键（支持多媒体键）
CONFIG_ZMK_USB_REPORT_POLL_INTERVAL=1    # USB 报告间隔（1ms，有线低延迟）

# ===================== 按键扫描（自制键盘核心） =====================
CONFIG_ZMK_POLLING_KEYSCAN=y             # 轮询扫描按键（自制键盘必开）
CONFIG_ZMK_POLLING_KEYSCAN_INTERVAL=5    # 扫描间隔5ms（格斗键盘低延迟）
CONFIG_ZMK_DEBOUNCE_PERIOD=5             # 按键消抖5ms（避免误触）

# ===================== OLED 屏幕支持（双模式显示状态） =====================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_128X64=y
CONFIG_ZMK_DISPLAY_STATUS=y              # 显示蓝牙/USB 连接状态、电量
CONFIG_I2C=y
CONFIG_SSD1306=y

# ===================== 功耗优化（无线续航） =====================
CONFIG_ZMK_IDLE_SLEEP=y                  # 闲置休眠（无线模式省电）
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300        # 闲置5分钟休眠（可改，比如60=1分钟）
CONFIG_ZMK_WAKEUP_ON_KEYPRESS=y          # 按键唤醒休眠
CONFIG_PM=y                              # 开启电源管理

# ===================== 调试（可选，排错用） =====================
# CONFIG_ZMK_LOG_LEVEL=DEBUG              # 开启调试日志（正常使用注释掉）
# CONFIG_CONSOLE=y                        # 开启控制台（正常使用注释掉）